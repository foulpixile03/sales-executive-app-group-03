name: CI - Build and Test

# WHEN should this run?
on:
  push:
    branches: [ "main" ]        # runs every time you push to main
  pull_request:
    branches: [ "main" ]        # runs every time someone opens a PR into main

jobs:

  # ---------- JOB 1: Backend (Spring Boot / Java) ----------
  backend:
    name: Build Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Aisales/aisales_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build with Maven (skip tests - no DB available in CI)
        run: ./mvnw clean package -DskipTests

  # ---------- JOB 2: Frontend (React + Vite) ----------
  frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Aisales/aisales_frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Aisales/aisales_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code (warnings shown, won't block build)
        run: npm run lint || true

      - name: Build project
        run: npm run build